<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanaskar Team - PrevisStudio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <header class="border-b border-slate-800 bg-slate-900/60 backdrop-blur sticky top-0 z-40 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center">
        <i data-lucide="film" class="w-5 h-5 text-white"></i>
      </div>
      <div>
        <div class="text-[10px] font-extrabold uppercase tracking-widest text-indigo-400">Hanaskar Team</div>
        <div class="font-bold text-lg text-white">Neon Dreams - MV Concept</div>
        <div class="text-xs text-slate-400">Sutradara: Nathan Izz Wardhana</div>
      </div>
    </div>
    <div class="flex bg-slate-950 p-1 rounded-xl border border-slate-800">
      <button onclick="switchTab('storyline')" id="tab-storyline" class="px-6 py-2 rounded-lg text-sm font-semibold transition">Storyline</button>
      <button onclick="switchTab('storyboard')" id="tab-storyboard" class="px-6 py-2 rounded-lg text-sm font-semibold transition">Storyboard</button>
    </div>
  </header>

  <main class="p-6 max-w-7xl w-full mx-auto" id="main-content"></main>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwkqQ_dZWrS-ZhHoTc1VOgT1FdWc5hmhI7OHdjKpO83mOKGHacLQhXURF5LqQLY8pg5/exec";
    
    let state = {
      storyline: [{scene: "1", visual: "Close up mata", audio: "Musik synthwave masuk", duration: "5s"}],
      storyboard: [{panel: "1", desc: "Deskripsi", camera: "Wide", image: ""}]
    };
    let activeTab = 'storyline';

    // Perbaikan: Menambahkan try-catch agar error fetch tidak menghentikan aplikasi
    function saveState() {
      localStorage.setItem('hanaskar_state', JSON.stringify(state));
      try {
        fetch(GAS_URL, {
          method: "POST", 
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ room: "global-hanaskar-project", state: JSON.stringify(state) })
        }).catch(e => console.log("Background sync skipped (offline/CORS)")); 
      } catch (err) {
        console.log("Sync error ignored");
      }
    }

    function loadState() {
      const saved = localStorage.getItem('hanaskar_state');
      if (saved) state = JSON.parse(saved);
      
      try {
        fetch(`${GAS_URL}?room=global-hanaskar-project`)
          .then(res => res.json())
          .then(data => { if(data && data.state) { state = JSON.parse(data.state); render(); } })
          .catch(e => console.log("Load skipped (offline)"));
      } catch (err) {
        console.log("Load error ignored");
      }
    }

    function switchTab(t) { activeTab = t; render(); }

    function addRow(t) {
      if(t === 'storyline') state.storyline.push({scene: (state.storyline.length+1).toString(), visual: '', audio: '', duration: ''});
      else state.storyboard.push({panel: (state.storyboard.length+1).toString(), desc: '', camera: '', image: ''});
      saveState(); render();
    }

    function movePanel(i, d) {
      const n = i + d;
      if (n >= 0 && n < state.storyboard.length) {
        [state.storyboard[i], state.storyboard[n]] = [state.storyboard[n], state.storyboard[i]];
        state.storyboard.forEach((s, idx) => s.panel = (idx + 1).toString());
        saveState(); render();
      }
    }

    function update(type, i, field, val) {
      state[type][i][field] = val;
      saveState();
    }

    function handleImg(i, e) {
      const f = e.target.files[0];
      if (f) {
        const r = new FileReader();
        r.onload = (ev) => { state.storyboard[i].image = ev.target.result; saveState(); render(); };
        r.readAsDataURL(f);
      }
    }

    function render() {
      const m = document.getElementById('main-content');
      if (activeTab === 'storyline') {
        m.innerHTML = `
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Storyline</h2>
            <button onclick="addRow('storyline')" class="bg-indigo-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-500 transition">+ Tambah Baris</button>
          </div>
          <div class="space-y-2">
            ${state.storyline.map((s, i) => `
              <div class="grid grid-cols-4 gap-4 bg-slate-900 p-4 rounded-xl border border-slate-800">
                <input class="bg-slate-950 p-2 rounded border border-slate-800 text-sm" value="${s.scene}" oninput="update('storyline', ${i}, 'scene', this.value)" placeholder="Scene #">
                <input class="bg-slate-950 p-2 rounded border border-slate-800 text-sm" value="${s.visual}" oninput="update('storyline', ${i}, 'visual', this.value)" placeholder="Visual">
                <input class="bg-slate-950 p-2 rounded border border-slate-800 text-sm" value="${s.audio}" oninput="update('storyline', ${i}, 'audio', this.value)" placeholder="Audio">
                <input class="bg-slate-950 p-2 rounded border border-slate-800 text-sm" value="${s.duration}" oninput="update('storyline', ${i}, 'duration', this.value)" placeholder="Durasi">
              </div>
            `).join('')}
          </div>
        `;
      } else {
        m.innerHTML = `
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Storyboard</h2>
            <button onclick="addRow('storyboard')" class="bg-indigo-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-500 transition">+ Tambah Panel</button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            ${state.storyboard.map((s, i) => `
              <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-4">
                <div class="flex justify-between items-center">
                  <div class="font-bold text-indigo-400">Panel ${s.panel}</div>
                  <div class="flex gap-1">
                    <button onclick="movePanel(${i}, -1)" class="p-1 hover:bg-slate-800 rounded">▲</button>
                    <button onclick="movePanel(${i}, 1)" class="p-1 hover:bg-slate-800 rounded">▼</button>
                  </div>
                </div>
                <div class="relative group h-40 bg-slate-950 rounded-lg overflow-hidden border border-slate-800 flex items-center justify-center">
                  ${s.image ? `<img src="${s.image}" class="h-full w-full object-cover">` : '<span class="text-slate-600 text-xs">Belum ada gambar</span>'}
                  <label class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 bg-black/50 cursor-pointer transition">
                    <i data-lucide="upload" class="w-6 h-6"></i>
                    <input type="file" class="hidden" onchange="handleImg(${i}, event)" accept="image/*">
                  </label>
                </div>
                <input class="w-full bg-slate-950 p-2 rounded border border-slate-800 text-sm" value="${s.desc}" oninput="update('storyboard', ${i}, 'desc', this.value)" placeholder="Deskripsi">
                <input class="w-full bg-slate-950 p-2 rounded border border-slate-800 text-sm" value="${s.camera}" oninput="update('storyboard', ${i}, 'camera', this.value)" placeholder="Camera">
              </div>
            `).join('')}
          </div>
        `;
      }
      document.getElementById('tab-storyline').className = (activeTab === 'storyline') ? "px-6 py-2 rounded-lg text-sm font-semibold bg-slate-800 text-white" : "px-6 py-2 rounded-lg text-sm font-semibold text-slate-400";
      document.getElementById('tab-storyboard').className = (activeTab === 'storyboard') ? "px-6 py-2 rounded-lg text-sm font-semibold bg-slate-800 text-white" : "px-6 py-2 rounded-lg text-sm font-semibold text-slate-400";
      lucide.createIcons();
    }

    window.onload = () => { loadState(); render(); setInterval(loadState, 5000); };
  </script>
</body>
</html>
